<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="1280" height="720" viewBox="0 0 1280 720">
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
    <svg x="0" y="0" width="1280" height="240" viewBox="0 188 2933 553" preserveAspectRatio="none">
      <image href="campus_panorama.png" x="0" y="0" width="2933" height="1209" preserveAspectRatio="none"/>
    </svg>
    <rect x="0" y="0" width="1280" height="241" fill="#006C39" fill-opacity="0.9"/>
    <rect x="0" y="240" width="1280" height="21" fill="#A13F0B"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#FFFFFF" stroke-width="2"/>
  </g>
  <g id="brand-mark">
    <image href="bit_wordmark.png" x="527" y="88" width="225" height="63" preserveAspectRatio="none"/>
  </g>
  <g id="chapter-title">
    <ellipse cx="426" cy="491" rx="41" ry="41" fill="#A13F0B"/>
    <text x="426" y="506" text-anchor="middle" font-family="Century Gothic, Arial, sans-serif" font-size="58" fill="#FFFFFF">{{CHAPTER_NUM}}</text>
    <text x="505" y="500" font-family="Microsoft YaHei, Arial, sans-serif" font-size="48" font-weight="bold" fill="#A2A2A2" letter-spacing="4">{{CHAPTER_TITLE}}</text>
    <text x="505" y="545" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" fill="#000000">{{CHAPTER_DESC}}</text>
  </g>
  <g id="footer-decoration">
    <rect x="0" y="688" width="1280" height="32" fill="#006C39" fill-opacity="0.06"/>
  </g>
</svg>
