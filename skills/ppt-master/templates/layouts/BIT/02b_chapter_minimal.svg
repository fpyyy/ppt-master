<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="1280" height="720" viewBox="0 0 1280 720">
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>
    <rect x="0" y="0" width="1280" height="12" fill="#006C39"/>
    <rect x="0" y="12" width="1280" height="4" fill="#A13F0B"/>
  </g>
  <g id="header">
    <image href="header_logo.png" x="1050" y="28" width="182" height="40" preserveAspectRatio="xMidYMid meet"/>
    <text x="70" y="62" font-family="Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="bold" fill="#000000">{{CHAPTER_TITLE}}</text>
    <text x="70" y="100" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#A2A2A2">{{CHAPTER_DESC}}</text>
  </g>
  <g id="center-divider">
    <text x="640" y="356" text-anchor="middle" font-family="Century Gothic, Arial, sans-serif" font-size="96" font-weight="bold" fill="#006C39" fill-opacity="0.10">{{CHAPTER_NUM}}</text>
    <line x1="340" y1="384" x2="940" y2="384" stroke="#006C39" stroke-width="2"/>
    <rect x="594" y="377" width="92" height="14" fill="#A13F0B"/>
  </g>
  <g id="bottom-academic-motif">
    <path d="M 60 665 C 165 628 280 628 385 665 C 490 702 605 702 710 665 C 815 628 930 628 1035 665 C 1110 691 1182 697 1240 682" fill="none" stroke="#A2A2A2" stroke-width="2" stroke-opacity="0.35"/>
    <path d="M 64 694 L 236 694 M 320 694 L 492 694 M 576 694 L 748 694 M 832 694 L 1004 694 M 1088 694 L 1216 694" fill="none" stroke="#A2A2A2" stroke-width="3" stroke-opacity="0.28"/>
  </g>
</svg>

