<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="coverBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#008244"/>
      <stop offset="100%" stop-color="#006C39"/>
    </linearGradient>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#006C39"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#coverBg)"/>
  </g>
  <g id="left-panel">
    <path d="M 19 0 L 690 0 C 764 96 808 220 808 360 C 808 500 764 624 690 720 L 19 720 Z" fill="#A13F0B"/>
    <path d="M 0 0 L 666 0 C 738 99 780 221 780 360 C 780 499 738 621 666 720 L 0 720 Z" fill="#FFFFFF"/>
    <path d="M 74 424 L 760 424" fill="none" stroke="#006C39" stroke-width="3"/>
    <text x="68" y="80" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="bold" fill="#A2A2A2" letter-spacing="1.33">◀ BIT ▶</text>
  </g>
  <g id="cover-images">
    <image href="cover_building.png" x="864" y="-80" width="828" height="797" preserveAspectRatio="none"/>
    <image href="cover_emblem.png" x="866" y="231" width="340" height="259" preserveAspectRatio="none"/>
  </g>
  <g id="title-block">
    <text x="80" y="272" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24" fill="#000000">{{SUBTITLE}}</text>
    <text x="80" y="324" font-family="Microsoft YaHei, Arial, sans-serif" font-size="44" font-weight="bold" fill="#000000">
      <tspan x="80" dy="0">{{TITLE}}</tspan>
    </text>
    <text x="80" y="456" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" fill="#000000">答辩人：{{AUTHOR}}　　导师：{{ADVISOR}}　　时间：{{DATE}}</text>
  </g>
</svg>

